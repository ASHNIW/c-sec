<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { bgDark: '#0E1015', cardDark: '#1A1D24', brand: '#5E6AD2' } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 dark:bg-bgDark text-gray-900 dark:text-gray-100 h-screen flex overflow-hidden font-sans">

    <aside class="w-64 bg-white dark:bg-cardDark border-r border-gray-200 dark:border-gray-800 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-800">
            <span class="font-semibold text-lg tracking-tight">Class Portal</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 bg-gray-100 dark:bg-[#252830] text-brand rounded-lg font-medium">Dashboard</a>
            <a href="students.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-[#252830] rounded-lg">Student Directory</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-[#252830] rounded-lg">Class Notes</a>
            <a href="#" id="adminMenu" class="hidden flex items-center gap-3 px-3 py-2 text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg mt-8">Admin Panel</a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800">
            <button onclick="logout()" class="w-full text-left px-3 py-2 text-gray-600 dark:text-gray-400 hover:text-red-500 rounded-lg">Log Out</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white dark:bg-cardDark border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-8">
            <h1 class="font-semibold">Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="userNameDisplay" class="text-sm font-medium"></span>
                <div class="w-8 h-8 rounded-full bg-brand flex items-center justify-center text-white font-semibold text-sm">👤</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <h2 class="text-2xl font-semibold mb-6">Welcome back</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="p-6 bg-white dark:bg-cardDark border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-medium mb-2">Platform Status</h3>
                    <p class="text-3xl font-semibold text-green-500">Online</p>
                </div>
                <div class="p-6 bg-white dark:bg-cardDark border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm">
                    <h3 class="text-gray-500 dark:text-gray-400 text-sm font-medium mb-2">Total Notes</h3>
                    <p class="text-3xl font-semibold">12</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
